    const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const MESES_C = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

    function formatFecha(fi, ff) {
      const d1 = new Date(fi + 'T12:00:00');
      const d2 = new Date(ff + 'T12:00:00');
      if (d1.getMonth() === d2.getMonth()) {
        return `${d1.getDate()}–${d2.getDate()} ${MESES_C[d1.getMonth()]} ${d1.getFullYear()}`;
      }
      return `${d1.getDate()} ${MESES_C[d1.getMonth()]} – ${d2.getDate()} ${MESES_C[d2.getMonth()]} ${d2.getFullYear()}`;
    }

    function catBadge(cat) {
      const c = CAT[cat] || { label: cat, color: '#6b7a8d' };
      return `<span class="badge-cat" style="background:${c.color}">${c.label}</span>`;
    }

    function supBadge(sup) {
      const s = SUP[sup] || { label: sup, color: '#aaa' };
      return `<span class="badge-sup" style="background:${s.color}1a;color:${s.color};border-color:${s.color}50">${s.label}</span>`;
    }

    function renderTorneos(lista) {
      const grid = document.getElementById('torneos-grid');
      if (!lista.length) {
        grid.innerHTML = '<div class="no-resultados"><div class="icono">🎾</div><p>No hay torneos en esta categoría</p></div>';
        return;
      }
      const sorted = lista.slice().sort((a, b) => new Date(b.fi) - new Date(a.fi));
      grid.innerHTML = sorted.map(t => {
        const c = CAT[t.cat] || { color: '#aaa' };
        return `
        <div class="torneo-card" data-cat="${t.cat}">
          <div class="torneo-card-top" style="border-top:3px solid ${c.color}">
            <div class="torneo-card-badges">
              ${catBadge(t.cat)}
              ${supBadge(t.sup)}
            </div>
            <div class="torneo-card-nombre">${t.nombre}</div>
            <div class="torneo-card-lugar">${t.bandera} ${t.ciudad}, ${t.pais}</div>
            <div class="torneo-card-fecha">${formatFecha(t.fi, t.ff)}</div>
          </div>
          <div class="torneo-card-final">
            <div class="torneo-final-titulo">FINAL</div>
            <div class="torneo-final-campeon">
              <span class="trofeo">🏆</span>
              <span class="campeon-nombre">${t.campeon}</span>
              <span class="campeon-ranking">(${t.rc})</span>
            </div>
            <div class="torneo-final-vs">def. ${t.finalista} (${t.rf})</div>
            <div class="torneo-final-resultado">${t.resultado}</div>
          </div>
        </div>`;
      }).join('');
    }

    function filtrar(cat, btn) {
      document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
      btn.classList.add('activo');
      const lista = cat === 'todos' ? TORNEOS_JUGADOS : TORNEOS_JUGADOS.filter(t => t.cat === cat);
      renderTorneos(lista);
    }

    function renderCalendario() {
      const grupos = {};
      TORNEOS_PROXIMOS.forEach(t => {
        const mes = new Date(t.fi + 'T12:00:00').getMonth();
        if (!grupos[mes]) grupos[mes] = [];
        grupos[mes].push(t);
      });

        <div class="cal-mes">
          <div class="cal-mes-titulo">${MESES[parseInt(mes)]} 2026</div>
          <div class="cal-lista">
            ${torneos.map(t => `
              <div class="cal-item ${t.estado === 'en-curso' ? 'en-curso' : ''}">
                <div class="cal-item-fecha">${formatFecha(t.fi, t.ff)}</div>
                <div class="cal-item-info">
                  <div class="cal-item-nombre">
                    ${t.estado === 'en-curso' ? '<span class="badge-en-curso">EN CURSO</span>' : ''}
                    ${t.nombre}
                  </div>
                  <div class="cal-item-lugar">${t.bandera} ${t.ciudad}, ${t.pais}</div>
                </div>
                <div class="cal-item-badges">
                  ${catBadge(t.cat)}
                  ${supBadge(t.sup)}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function cambiarTab(tab) {
      document.getElementById('tab-jugados').style.display   = tab === 'jugados'    ? '' : 'none';
      document.getElementById('tab-calendario').style.display = tab === 'calendario' ? '' : 'none';
      document.getElementById('btn-jugados').classList.toggle('activo',    tab === 'jugados');
      document.getElementById('btn-calendario').classList.toggle('activo', tab === 'calendario');
    }

    renderTorneos(TORNEOS_JUGADOS);
    renderCalendario();
  </script>
</body>
</html>
